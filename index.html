<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link href="./style.css" rel="stylesheet">
	<link href="./animations.css" rel="stylesheet">
	<title>Rock, Paper, Scissors</title>
</head>
<body>

	<main>
		<h1>Rock Paper Scissors!</h1>

		<div id="main_con">
			<h2 id="round_label">Round <span id="round_number">0</span></h2>

			<div class="mid_box_con">
				<div class="mid_box1">
					<img id="human_img" src="./images/human-question-mark.png">
					<span class="d_block">Human: <span id="human">?</span></span>
				</div>

				<span class="d_block vs">vs</span>
				
				<div class="mid_box2">
					<img id="computer_img" src="./images/computer-question-mark.png">
					<span class="d_block">Computer: <span id="computer">?</span></span>
				</div>
			</div> <!-- .mid_box_con -->
 
			<h2 id="result_description">Play the game!</h2>

			<div class="btm_box_con">
				<div class="btm_box1"><span class="d_block score_label">Human</span><span id="human_score" class="d_block score_num">0</span></div>
				<div class="btm_box2"><span class="d_block score_label">Computer</span><span id="computer_score" class="d_block score_num">0</span></div>
			</div>

		</div>

		<div id="choices">
			<button id="rock"><img src="./images/human-rock.png"><span>rock</span></button>
			<button id="paper"><img src="./images/human-paper.png"><span>paper</span></button>
			<button id="scissors"><img src="./images/human-scissors.png"><span>scissors</span></button>
		</div>

		
	
	<div class="game-over-overlay d_none">
		<div id="win_msg" class="d_none">
			<span class="game-over-title title-win">🎉 YOU WON!</span>
			<p id="final_subtext">You defeated the machine 2 to 1!</p>
		</div>

		<div id="lose_msg" class="d_none">
			<span class="game-over-title title-lose">💀 YOU LOSE!</span>
		</div>
		
		<button id="play" class="">Play Again?</button>
	</div>
	</main>

	<script src="./script.js"></script>
</body>
</html>
